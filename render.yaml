services:
  - type: web
    name: indian-stock-news-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEWSAPI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
